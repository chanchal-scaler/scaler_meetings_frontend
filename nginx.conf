server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Vite build with base=/meetings-standalone/ requests assets under this prefix.
  # Rewrite to real on-disk /assets/* and prevent SPA fallback HTML for static files.
  location ^~ /meetings-standalone/assets/ {
    rewrite ^/meetings-standalone/(.*)$ /$1 break;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA routes under /meetings-standalone should resolve to index.html.
  location ^~ /meetings-standalone/ {
    try_files $uri $uri/ /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
